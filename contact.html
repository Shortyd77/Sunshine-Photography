<main>
	<h2>Book a Session</h2>
	<div class="booking-info">
		<p>For enquiries and booking reach me by email or fill out form below.</p>
		<p>Email:<a href="mailto:shortydee34@gmail.com">shortydee34@gmail.com</a></p>
	</div>

	<form method="post" action="#" name="booking" id="booking-form" class="booking-form">
		<div class="form-group">
			<label for="name" class="required">Name:</label>
			<input type="text" name="name" id="name" required title="Please enter your name">
		</div>

		<div class="form-group">
			<label for="email" class="required">Email:</label>
			<input type="email" name="email" id="email" required title="Please enter a valied email address">
		</div>

		<div class="form-group">
			<label for="phone">Phone Number(Optional):</label>
			<input type="text" name="phone" id="phone" data-type="number" title="Please enter numbers only">
		</div>

		<div class="form-group">
			<label for="date" class="required">Proposed Date:</label>
			<input type="date" name="date" id="date" required title="Please select a date">
		</div>

		<div class="form-group">
			<label for="message" class="required">Tell me about your vision:</label>
			<textarea name="message" id="message" rows="5" required title="Please type a message"></textarea>
		</div>

		<div class="form-group">
			<input type="sumbit" value="Send Inquiry"
        </div>
	</form>
